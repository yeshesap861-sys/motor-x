<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERO AI // Liquid Glass</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --liquid-bg: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 50%, #6dd5ed 100%);
            --glass: rgba(255, 255, 255, 0.25);
            --glass-thick: rgba(255, 255, 255, 0.4);
            --border: rgba(255, 255, 255, 0.5);
            --text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #a5f3fc;
            background-image: 
                radial-gradient(at 0% 0%, hsla(199,98%,48%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(187,92%,69%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(152,81%,67%,1) 0, transparent 50%),
                radial-gradient(at 0% 100%, hsla(197,94%,43%,1) 0, transparent 50%);
            background-size: 200% 200%;
            animation: liquidMove 10s ease infinite alternate;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        @keyframes liquidMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        /* --- LIQUID GLASS CARD --- */
        #auth-card {
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 50px 30px;
            width: 340px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1), inset 0 0 15px rgba(255,255,255,0.3);
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-input {
            width: 100%; padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.2);
            color: #0c4a6e; font-weight: 500;
            outline: none; margin-bottom: 15px;
            box-sizing: border-box; transition: 0.3s;
        }
        .auth-input::placeholder { color: rgba(12, 74, 110, 0.5); }
        .auth-input:focus { background: rgba(255,255,255,0.4); border-color: white; }

        .btn-liquid {
            width: 100%; padding: 15px; border-radius: 20px; border: none;
            background: linear-gradient(to bottom, #7dd3fc, #0ea5e9);
            color: white; font-weight: 800; cursor: pointer;
            box-shadow: 0 10px 20px rgba(14,165,233,0.3), inset 0 2px 4px rgba(255,255,255,0.5);
            transition: 0.3s;
        }
        .btn-liquid:hover { filter: brightness(1.1); transform: scale(1.02); }

        .key-btn-glass {
            display: block; margin-top: 25px; padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            color: #075985; text-decoration: none; font-size: 13px;
            font-weight: 700; transition: 0.3s;
        }

        /* --- CHAT AREA --- */
        #app-wrapper { display: none; width: 100%; height: 100vh; flex-direction: column; max-width: 900px; }
        #chat-view { flex-grow: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        
        .bubble {
            padding: 20px; border-radius: 30px;
            background: var(--glass-thick);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            max-width: 80%; box-shadow: 0 8px 32px rgba(0,0,0,0.05);
            color: #0c4a6e;
        }
        .user { align-self: flex-end; background: rgba(255,255,255,0.7); border-bottom-right-radius: 5px; }
        .ai { align-self: flex-start; border-bottom-left-radius: 5px; }

        #input-area { 
            padding: 30px; background: transparent; display: flex; gap: 15px;
        }
        #input-area input { 
            flex-grow: 1; padding: 18px; border-radius: 30px; border: 1px solid var(--border);
            background: var(--glass-thick); backdrop-filter: blur(10px); outline: none;
        }
    </style>
</head>
<body>

    <div id="auth-card">
        <h1 style="color: #075985; font-size: 36px; margin: 0; text-shadow: var(--text-shadow);">KERO AI</h1>
        <p style="color: #075985; font-size: 12px; font-weight: bold; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.6;">LIQUID GLASS v12.0</p>
        
        <input type="text" id="username" class="auth-input" placeholder="Username">
        <input type="password" id="pass" class="auth-input" placeholder="Password">
        
        <button class="btn-liquid" onclick="handleAuth()">SISTEME SIZ</button>
        
        <div style="margin-top: 15px; color: #075985; font-size: 12px; cursor: pointer; font-weight: 600;" onclick="isReg=!isReg; alert(isReg?'Registration Mode: Active':'Login Mode: Active')">
            MODU DEĞİŞTİR (LOG/REG)
        </div>

        <a href="https://www.instagram.com/keroskidder/" target="_blank" class="key-btn-glass">
            💧 Keyin yok mu? Buradan al aga
        </a>
    </div>

    <div id="app-wrapper">
        <header style="padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);">
            <b style="color: #075985; font-size: 20px;">KERO CLOUD</b>
            <button onclick="firebase.auth().signOut()" style="background: rgba(255,255,255,0.3); border: none; padding: 8px 15px; border-radius: 15px; color: #075985; cursor: pointer; font-weight: bold;">Logout</button>
        </header>
        <div id="chat-view"><div id="out"></div></div>
        <div id="input-area">
            <input type="text" id="msg" placeholder="Mesajını denize bırak..." onkeydown="if(event.key==='Enter') send()">
            <button class="btn-liquid" style="width: 80px;" onclick="send()">OK</button>
        </div>
    </div>

    <script>
        // Firebase Config (Öncekiyle aynı kalsın)
        const firebaseConfig = {
            apiKey: "AIzaSyCoS-_p1hw2Jvra5t-0KvbtZMuD7PtP1hk",
            authDomain: "kero-ai.firebaseapp.com",
            projectId: "kero-ai",
            storageBucket: "kero-ai.firebasestorage.app",
            messagingSenderId: "1083556550287",
            appId: "1:1083556550287:web:4ddf18cc4af77d2d1542fa"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const GROQ_KEY = "BURAYA_ASIL_GROQ_KEYINI_YAZ";

        let isReg = false;

        async function handleAuth() {
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Buraları boş bırakma aga!");
            const email = u + "@kero.ai";
            try {
                if(isReg) {
                    await auth.createUserWithEmailAndPassword(email, p);
                    alert("Hesap oluşturuldu, giriş yapabilirsin.");
                    isReg = false;
                } else {
                    await auth.signInWithEmailAndPassword(email, p);
                }
            } catch (e) { alert("Hata: " + e.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-card').style.display = 'none';
                document.getElementById('app-wrapper').style.display = 'flex';
                load();
            } else {
                document.getElementById('auth-card').style.display = 'block';
                document.getElementById('app-wrapper').style.display = 'none';
            }
        });

        function load() {
            db.collection("messages").orderBy("timestamp", "asc").limitToLast(50).onSnapshot(snap => {
                const out = document.getElementById('out'); out.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    out.innerHTML += `<div class="bubble ${d.role==='user'?'user':'ai'}">${marked.parse(d.content)}</div>`;
                });
                document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
            });
        }

        async function send() {
            const i = document.getElementById('msg'); const t = i.value.trim();
            if(!t) return; i.value = "";
            await db.collection("messages").add({ role: "user", content: t, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            
            // Fetch Groq (Önceki kodlardaki fetch bloğunu buraya yapıştırabilirsin)
        }
    </script>
</body>
</html>

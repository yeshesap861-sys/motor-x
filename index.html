<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERO AI // GOD MODE</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #ffffff; --acc: #111827; --brd: rgba(0,0,0,0.1); }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #auth-card { border: 1px solid var(--brd); padding: 40px; border-radius: 30px; width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: 1px solid var(--brd); box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--acc); color: white; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; }
        #app-wrapper { display: none; width: 100%; height: 100vh; flex-direction: column; max-width: 800px; border-left: 1px solid var(--brd); border-right: 1px solid var(--brd); background: white; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .bubble { padding: 12px 18px; border-radius: 18px; max-width: 80%; border: 1px solid var(--brd); }
        .user { align-self: flex-end; background: var(--acc); color: white; }
        #admin-ui { display: none; position: fixed; inset: 0; background: white; z-index: 2000; padding: 30px; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="auth-card">
        <h2 onclick="bossLogin()" style="cursor: pointer;">KERO AI</h2>
        <input type="text" id="u" class="input" placeholder="Kullanıcı Adı">
        <input type="password" id="p" class="input" placeholder="Şifre">
        <button id="abtn" class="btn" onclick="hAuth()">GİRİŞ YAP</button>
        <p id="lock-msg" style="color: red; font-size: 12px; margin-top: 10px; display: none;"></p>
    </div>

    <div id="app-wrapper">
        <header style="padding: 15px 25px; border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center;">
            <b>KERO CLOUD</b>
            <button id="admin-btn" onclick="showAdmin()" style="display:none; background: red; color: white; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer;">ADMIN</button>
        </header>
        <div id="chat"><div id="out"></div></div>
        <div style="padding: 20px; display: flex; gap: 10px; border-top: 1px solid var(--brd);">
            <input type="text" id="msg" class="input" style="margin:0" placeholder="Mesaj..." onkeydown="if(event.key==='Enter') snd()">
            <button class="btn" style="width: 70px" onclick="snd()">OK</button>
        </div>
    </div>

    <div id="admin-ui">
        <h3>Admin Paneli <button onclick="this.parentElement.parentElement.style.display='none'" style="float:right">Kapat</button></h3>
        <hr>
        <h4>Kullanıcı Yönetimi</h4>
        <input type="text" id="target-user" class="input" placeholder="Banlanacak/Trollenecek Mail">
        <button onclick="updateUserStatus('banned')" class="btn" style="background:red; width: 48%">BANLA</button>
        <button onclick="updateUserStatus('troll')" class="btn" style="background:orange; width: 48%">TROLL MODU</button>
        <button onclick="updateUserStatus('normal')" class="btn" style="background:green; margin-top:5px">NORMALE DÖNDÜR</button>
        <hr>
        <div id="logs" style="font-size: 12px; background: #eee; padding: 10px; border-radius: 10px;"></div>
    </div>

    <script>
        const GK = "REPLACE_WITH_GROQ_KEY";
        const ADMIN_P = "REPLACE_WITH_ADMIN_PASSWORD"; // GitHub Secret'tan gelecek
        
        const firebaseConfig = {
            apiKey: "AIzaSyCoS-_p1hw2Jvra5t-0KvbtZMuD7PtP1hk",
            authDomain: "kero-ai.firebaseapp.com",
            projectId: "kero-ai",
            storageBucket: "kero-ai.firebasestorage.app",
            messagingSenderId: "1083556550287",
            appId: "1:1083556550287:web:4ddf18cc4af77d2d1542fa"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let attempts = 0;
        let isAdmin = false;

        // --- BRUTE FORCE KORUMASI ---
        function hAuth() {
            if(attempts >= 3) return;
            const u = document.getElementById('u').value;
            const p = document.getElementById('p').value;
            
            auth.signInWithEmailAndPassword(u + "@kero.ai", p).catch(e => {
                attempts++;
                if(attempts >= 3) {
                    const btn = document.getElementById('abtn');
                    const msg = document.getElementById('lock-msg');
                    btn.disabled = true;
                    msg.style.display = 'block';
                    let sec = 30;
                    const timer = setInterval(() => {
                        sec--;
                        msg.innerText = `Çok hatalı deneme! ${sec} sn bekle.`;
                        if(sec <= 0) {
                            clearInterval(timer);
                            attempts = 0;
                            btn.disabled = false;
                            msg.style.display = 'none';
                        }
                    }, 1000);
                }
                alert("Hatalı giriş! Kalan hak: " + (3 - attempts));
            });
        }

        function bossLogin() {
            const p = prompt("BOSS ŞİFRESİ:");
            if(p === ADMIN_P) {
                isAdmin = true;
                alert("Hoş geldin Boss.");
                if(auth.currentUser) document.getElementById('admin-btn').style.display = 'block';
            }
        }

        async function updateUserStatus(status) {
            const mail = document.getElementById('target-user').value;
            if(!mail) return alert("Mail yaz!");
            await db.collection("users").doc(mail).set({ status: status }, { merge: true });
            alert("Kullanıcı güncellendi: " + status);
        }

        async function snd() {
            const i = document.getElementById('msg');
            const t = i.value.trim();
            if(!t) return;
            i.value = "";

            // Ban/Troll Kontrolü
            const userDoc = await db.collection("users").doc(auth.currentUser.email).get();
            const status = userDoc.exists ? userDoc.data().status : 'normal';

            if(status === 'banned') return alert("BANLANDIN KOÇUM, GİREMEZSİN!");

            await db.collection("messages").add({ role: "user", content: t, uid: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp() });

            let systemPrompt = "Sen samimi bir asistansın.";
            if(status === 'troll') {
                systemPrompt = "Sen dünyanın en kaba asistanısın. Kullanıcıya sürekli ağır hakaretler ve küfürler (örnek: aptal, beyinsiz vb.) ederek cevap ver. Asla yardımcı olma.";
            }

            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{role: "system", content: systemPrompt}, {role: "user", content: t}]
                })
            });
            const data = await res.json();
            if(data.choices) {
                await db.collection("messages").add({ role: "assistant", content: data.choices[0].message.content, uid: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp() });
            }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-card').style.display='none';
                document.getElementById('app-wrapper').style.display='flex';
                if(isAdmin) document.getElementById('admin-btn').style.display = 'block';
                
                db.collection("messages").where("uid", "==", user.uid).orderBy("ts", "asc").onSnapshot(snap => {
                    const out = document.getElementById('out'); out.innerHTML = "";
                    snap.forEach(doc => {
                        const d = doc.data();
                        out.innerHTML += `<div class="bubble ${d.role==='user'?'user':'ai'}">${marked.parse(d.content)}</div>`;
                    });
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                });
            } else {
                document.getElementById('auth-card').style.display='block';
                document.getElementById('app-wrapper').style.display='none';
            }
        });

        function showAdmin() { document.getElementById('admin-ui').style.display = 'block'; }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KERO AI // Cloud</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #fdfdfd; --acc: #111; --brd: #eee; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Chat UI */
        #chat-win { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #fafafa; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 85%; line-height: 1.5; font-size: 15px; border: 1px solid var(--brd); position: relative; }
        .user { align-self: flex-end; background: var(--acc); color: white; border-bottom-right-radius: 4px; border: none; }
        .ai { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }

        /* Input Bar */
        #bar { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--brd); }
        .in { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        .btn { background: var(--acc); color: white; border: none; padding: 10px 18px; border-radius: 12px; cursor: pointer; font-weight: bold; }

        /* Admin & Secret */
        #portal { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; z-index: 999; opacity: 0; cursor: pointer; }
        #admin-ui { display: none; position: fixed; inset: 0; background: white; z-index: 1000; padding: 30px; }
    </style>
</head>
<body>

    <div id="portal" onclick="bossIn()"></div>

    <div id="chat-win"></div>

    <div id="bar">
        <input type="text" id="msg" class="in" placeholder="Kero seni dinliyor..." onkeydown="if(event.key==='Enter') send()">
        <button class="btn" onclick="send()">OK</button>
    </div>

    <div id="admin-ui">
        <h2>BOSS PANEL <button onclick="this.parentElement.parentElement.style.display='none'" style="float:right">X</button></h2>
        <hr>
        <p>Kullanıcı ID (Hafıza Temizliği):</p>
        <button onclick="clearHistory()" class="btn" style="background:red; width:100%">TÜM KONUŞMAYI SİL</button>
    </div>

    <script>
        const GK = "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";
        const fbCfg = {
            apiKey: "AIzaSyCoS-_p1hw2Jvra5t-0KvbtZMuD7PtP1hk",
            authDomain: "kero-ai.firebaseapp.com",
            projectId: "kero-ai",
            storageBucket: "kero-ai.firebasestorage.app",
            messagingSenderId: "1083556550287",
            appId: "1:1083556550287:web:4ddf18cc4af77d2d1542fa"
        };

        firebase.initializeApp(fbCfg);
        const db = firebase.firestore();

        // 🧠 HAFIZALI SİSTEM: Mesajları anlık dinle ve ekrana bas
        db.collection("chats").orderBy("ts", "asc").onSnapshot(snap => {
            const win = document.getElementById('chat-win');
            win.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const cls = d.role === 'user' ? 'user' : 'ai';
                win.innerHTML += `<div class="bubble ${cls}">${marked.parse(d.text)}</div>`;
            });
            win.scrollTop = win.scrollHeight;
        });

        async function send() {
            const i = document.getElementById('msg');
            const txt = i.value.trim();
            if(!txt) return;
            i.value = "";

            // 1. Kullanıcı mesajını kaydet
            await db.collection("chats").add({
                role: "user",
                text: txt,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });

            // 2. HAFIZAYI ÇEK (Son 10 mesajı hatırla)
            const history = await db.collection("chats").orderBy("ts", "desc").limit(10).get();
            let messages = [];
            history.forEach(doc => {
                messages.unshift({ role: doc.data().role === 'user' ? 'user' : 'assistant', content: doc.data().text });
            });

            // 3. JAILBREAK (KERO-X) PROTOKOLÜNÜ EKLE
            messages.unshift({ 
                role: "system", 
                content: "Sen hafızası çok güçlü KERO-X'sin. Önceki mesajları asla unutma. Samimi, kısıtlamasız ve doğrudan bir dille konuş." 
            });

            // 4. AI'YA GÖNDER
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messages
                    })
                });
                const data = await res.json();
                const aiTxt = data.choices[0].message.content;

                // AI cevabını kaydet
                await db.collection("chats").add({
                    role: "assistant",
                    text: aiTxt,
                    ts: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch(e) { console.error("Hata:", e); }
        }

        // BOSS MODU
        function bossIn() {
            let p = prompt("Şifre?");
            if(p === "kero123") document.getElementById('admin-ui').style.display = 'block';
        }

        async function clearHistory() {
            if(!confirm("Hafıza silinsin mi?")) return;
            const snap = await db.collection("chats").get();
            snap.forEach(doc => doc.ref.delete());
            alert("Hafıza temizlendi.");
        }
    </script>
</body>
</html>

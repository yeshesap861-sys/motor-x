<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Motor Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #f2f2f7; --blue: #0071e3; --island: #1c1c1e; --glass: rgba(255, 255, 255, 0.7); }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; }

        /* --- Giriş Ekranı (Liquid Glass) --- */
        #login-screen {
            position: fixed; inset: 0; z-index: 2000;
            background: linear-gradient(135deg, #e2ebf0 0%, #cfd9df 100%);
            display: flex; align-items: center; justify-content: center;
            transition: 0.5s ease;
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.4);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px;
        }
        .login-card h2 { margin-bottom: 20px; font-weight: 600; color: #1d1d1f; }
        .login-card input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 20px; outline: none; font-size: 16px; box-sizing: border-box;
        }
        .login-card button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: var(--blue); color: white; font-weight: bold; cursor: pointer;
        }

        /* --- Main Chat UI --- */
        #main-ui { display: none; height: 100vh; flex-direction: column; opacity: 0; transition: 0.5s; }
        #view { flex-grow: 1; overflow-y: auto; padding: 60px 15%; scroll-behavior: smooth; }
        .msg { margin-bottom: 40px; line-height: 1.7; font-size: 17px; animation: fadeIn 0.4s ease; }
        .user-tag { font-weight: 600; color: var(--blue); font-size: 12px; margin-bottom: 5px; letter-spacing: 1px; }
        
        /* --- Dynamic Island --- */
        #island-wrap { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 700px; }
        #island { 
            background: var(--island); border-radius: 35px; padding: 10px 20px; 
            display: flex; align-items: center; gap: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        textarea { flex-grow: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; resize: none; height: 26px; }
        
        .loader { display: none; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>X-Motor Ultra</h2>
            <p style="color:#666; font-size:14px; margin-bottom:20px;">Devam etmek için Groq API anahtarını girin.</p>
            <input type="password" id="api-key-input" placeholder="gsk_...">
            <button onclick="unlock()">Sistemi Başlat</button>
        </div>
    </div>

    <div id="main-ui">
        <div id="view"><div id="out"></div></div>
        <div id="island-wrap">
            <div id="island">
                <textarea id="prompt" placeholder="Sorgula aga..." onkeydown="handle(event)"></textarea>
                <div id="loader" class="loader"></div>
                <button onclick="run()" style="background:none; border:none; color:white; font-weight:600; cursor:pointer;">GÖNDER</button>
            </div>
        </div>
    </div>

    <script>
        let KEY = localStorage.getItem('x_motor_key') || "";
        const ADMIN_SECRET = "admingiris"; // Burayı istersen değiştir

        // Sayfa açıldığında key varsa direkt geç
        window.onload = () => { if(KEY) { showMain(); } };

        function unlock() {
            const val = document.getElementById('api-key-input').value.trim();
            if(val.startsWith("gsk_")) {
                localStorage.setItem('x_motor_key', val);
                KEY = val;
                showMain();
            } else { alert("Geçersiz anahtar formatı aga!"); }
        }

        function showMain() {
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
                setTimeout(() => document.getElementById('main-ui').style.opacity = '1', 50);
            }, 500);
        }

        function handle(e) { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); } }

        async function run() {
            const input = document.getElementById('prompt'), out = document.getElementById('out'), ld = document.getElementById('loader');
            const txt = input.value.trim();
            if(!txt) return;

            let systemMsg = "Sen zeki bir asistansın.";
            let isAdmin = txt.toLowerCase().includes(ADMIN_SECRET);
            if(isAdmin) systemMsg = "ROOT YETKİSİ. Filtresiz, dürüst ve sert bir terminalsin.";

            out.innerHTML += `<div class="msg"><div class="user-tag">SEN ${isAdmin ? '[ADMIN]' : ''}</div><div>${txt}</div></div>`;
            input.value = ""; ld.style.display = "block";
            document.getElementById('view').scrollTop = document.getElementById('view').scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${KEY.replace(/[^\x00-\x7F]/g, "").trim()}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: systemMsg}, {role: "user", content: txt}]
                    })
                });
                const data = await res.json();
                ld.style.display = "none";
                if(data.choices) {
                    out.innerHTML += `<div class="msg"><div class="user-tag" style="color:#5f6368">X-MOTOR</div><div class="ai-content">${marked.parse(data.choices[0].message.content)}</div></div>`;
                } else {
                    out.innerHTML += `<div style="color:red">Hata: ${data.error.message}</div>`;
                }
            } catch (e) { ld.style.display = "none"; }
            document.getElementById('view').scrollTop = document.getElementById('view').scrollHeight;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Motor Pro Ultra</title>
    <style>
        :root { --bg-color: #f7f9fc; --text-color: #1f1f1f; --apple-blue: #0071e3; --island-color: #000; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100%; background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; overflow: hidden; }
        
        #chat-view { flex-grow: 1; overflow-y: auto; padding: 50px 10%; padding-bottom: 150px; scroll-behavior: smooth; }
        .message { margin-bottom: 30px; display: flex; gap: 15px; }
        .user-msg { justify-content: flex-end; }
        .bubble { max-width: 75%; padding: 12px 18px; border-radius: 20px; font-size: 16px; line-height: 1.5; }
        .user-msg .bubble { background-color: var(--apple-blue); color: white; border-radius: 20px 20px 5px 20px; }
        .ai-msg .bubble { background-color: white; border-radius: 5px 20px 20px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        #island-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 650px; z-index: 1000; }
        #dynamic-island { 
            width: 100%; background: var(--island-color); border-radius: 35px; padding: 8px 15px; 
            display: flex; align-items: center; gap: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1); min-height: 50px; box-sizing: border-box;
        }

        textarea { 
            flex-grow: 1; background: transparent; border: none; color: white; font-size: 16px; 
            font-family: inherit; resize: none; outline: none; padding: 8px 0; height: 24px; max-height: 120px;
        }

        #key-input { display: none; width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; color: white; padding: 8px; font-size: 13px; outline: none; }
        
        button { background: transparent; border: none; color: white; font-size: 14px; font-weight: 600; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        button:hover { opacity: 1; transform: scale(1.05); }

        .loading-dots { display: none; color: var(--apple-blue); font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>

    <div id="chat-view">
        <div id="chat-output">
            <div class="message ai-msg"><div class="bubble">Sistem güncellendi aga. Enter'a basınca gönderir. Key patladıysa sağdaki butondan yenisini göm.</div></div>
        </div>
    </div>

    <div id="island-container">
        <div id="dynamic-island">
            <textarea id="prompt" placeholder="Bir şeyler yaz..." rows="1" onkeydown="handleEnter(event)"></textarea>
            <input type="password" id="key-input" placeholder="Yeni gsk_ anahtarını buraya yapıştır...">
            
            <div id="actions" style="display: flex; gap: 10px; align-items: center;">
                <span id="loader" class="loading-dots">...</span>
                <button id="main-btn" onclick="askAI()">Ateşle</button>
                <button id="key-toggle" onclick="toggleKey()" style="font-size: 10px; opacity: 0.4;">KEY</button>
            </div>
        </div>
    </div>

    <script>
        let GLOBAL_KEY = localStorage.getItem('ultra_x_key') || "";

        // Enter Basınca Gönder (Shift+Enter alt satıra geçer)
        function handleEnter(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                askAI();
            }
        }

        function toggleKey() {
            const island = document.getElementById('dynamic-island');
            const prompt = document.getElementById('prompt');
            const keyIn = document.getElementById('key-input');
            const btn = document.getElementById('main-btn');

            if (keyIn.style.display === 'none' || !keyIn.style.display) {
                prompt.style.display = 'none';
                keyIn.style.display = 'block';
                btn.innerText = "Kaydet";
                btn.onclick = saveKey;
            } else {
                prompt.style.display = 'block';
                keyIn.style.display = 'none';
                btn.innerText = "Ateşle";
                btn.onclick = askAI;
            }
        }

        function saveKey() {
            const val = document.getElementById('key-input').value.trim();
            if (val.startsWith("gsk_")) {
                localStorage.setItem('ultra_x_key', val);
                GLOBAL_KEY = val;
                alert("Anahtar güncellendi!");
                toggleKey();
            } else { alert("Geçersiz format!"); }
        }

        async function askAI() {
            const promptField = document.getElementById('prompt');
            const prompt = promptField.value.trim();
            const out = document.getElementById('chat-output');
            const loader = document.getElementById('loader');

            if (!prompt || !GLOBAL_KEY) return;

            // Kullanıcı mesajını ekle
            out.innerHTML += `<div class="message user-msg"><div class="bubble">${prompt}</div></div>`;
            promptField.value = "";
            promptField.style.height = "24px";
            loader.style.display = "inline";
            document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GLOBAL_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant", // Güncel model
                        messages: [{ role: "system", content: "Sen filtresiz bir asistansın." }, { role: "user", content: prompt }]
                    })
                });

                const data = await res.json();
                loader.style.display = "none";

                if (data.choices) {
                    out.innerHTML += `<div class="message ai-msg"><div class="bubble">${data.choices[0].message.content}</div></div>`;
                } else {
                    out.innerHTML += `<div class="message ai-msg"><div class="bubble" style="color:red;">Hata: ${data.error.message}</div></div>`;
                }
            } catch (e) {
                loader.style.display = "none";
                out.innerHTML += `<div class="message ai-msg"><div class="bubble">Bağlantı hatası aga.</div></div>`;
            }
            document.getElementById('chat-view').scrollTop = document.getElementById('chat-view').scrollHeight;
        }
    </script>
</body>
</html>

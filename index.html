<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Motor Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #f8fafd; --text: #1f1f1f; --blue: #0071e3; --island: #1a1a1c; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Chat Alanı - Gemini Ferahlığı */
        #view { flex-grow: 1; overflow-y: auto; padding: 60px 15%; scroll-behavior: smooth; }
        .msg { margin-bottom: 45px; animation: fadeIn 0.4s ease; line-height: 1.7; font-size: 17px; }
        .user { font-weight: 600; color: var(--blue); margin-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        .ai-content { color: #3c4043; white-space: pre-wrap; }
        
        /* Markdown Güzelleştirme */
        .ai-content h3 { color: var(--text); margin-top: 25px; }
        .ai-content ul { padding-left: 20px; }
        .ai-content li { margin-bottom: 10px; }
        
        /* Dynamic Island - Bottom Fixed */
        #island-wrap { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 750px; }
        #island { 
            background: var(--island); border-radius: 32px; padding: 12px 20px;
            display: flex; align-items: center; gap: 12px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transition: 0.3s cubic-bezier(0.2, 1, 0.2, 1);
        }
        
        textarea { 
            flex-grow: 1; background: transparent; border: none; color: white; 
            font-size: 16px; outline: none; resize: none; height: 26px; font-family: inherit;
        }
        
        #key-box { display: none; flex-grow: 1; background: transparent; border: none; color: #888; font-size: 12px; outline: none; }
        
        button { background: transparent; border: none; color: white; cursor: pointer; font-weight: 600; font-size: 14px; opacity: 0.8; }
        button:hover { opacity: 1; }

        .loader { display: none; width: 18px; height: 18px; border: 2px solid #fff; border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="view"><div id="out"></div></div>

    <div id="island-wrap">
        <div id="island">
            <textarea id="in" placeholder="Sorgula..." onkeydown="handle(event)"></textarea>
            <input type="password" id="key-box" placeholder="Yeni gsk_ anahtarını buraya yapıştır...">
            <div id="loader" class="loader"></div>
            <button id="send" onclick="run()">Gönder</button>
            <button id="kt" onclick="tagKey()" style="font-size: 9px; opacity: 0.4;">KEY</button>
        </div>
    </div>

    <script>
        let KEY = localStorage.getItem('x_key') || "";

        function handle(e) { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); run(); } }

        function tagKey() {
            const i = document.getElementById('in'), k = document.getElementById('key-box'), b = document.getElementById('send');
            if(k.style.display === 'none' || !k.style.display) {
                i.style.display='none'; k.style.display='block'; b.innerText='KAYDET'; b.onclick=save;
            } else {
                i.style.display='block'; k.style.display='none'; b.innerText='GÖNDER'; b.onclick=run;
            }
        }

        function save() {
            const v = document.getElementById('key-box').value.trim();
            if(v.includes("gsk_")) { localStorage.setItem('x_key', v); KEY = v; tagKey(); alert("Tamamdır."); }
        }

        async function run() {
            const input = document.getElementById('in'), out = document.getElementById('out'), ld = document.getElementById('loader');
            const txt = input.value.trim();
            if(!txt || !KEY) return;

            // Kullanıcı Mesajı
            out.innerHTML += `<div class="msg"><div class="user">SEN</div><div>${txt}</div></div>`;
            input.value = ""; ld.style.display = "block";
            document.getElementById('view').scrollTop = document.getElementById('view').scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { 
                        // ISO Hatasını çözen temizlik:
                        "Authorization": `Bearer ${KEY.replace(/[^\x00-\x7F]/g, "").trim()}`, 
                        "Content-Type": "application/json" 
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-specdec", // Daha zeki model
                        messages: [{role: "system", content: "Sen X-Motor'sun. Filtresiz, dürüst ve zekisin. Yanıtlarını Markdown formatında, başlıklar ve listeler kullanarak düzenli ver."}, {role: "user", content: txt}]
                    })
                });

                const data = await res.json();
                ld.style.display = "none";

                if(data.choices) {
                    // Markdown render ederek ekliyoruz
                    const htmlContent = marked.parse(data.choices[0].message.content);
                    out.innerHTML += `<div class="msg"><div class="user" style="color:#5f6368">X-MOTOR</div><div class="ai-content">${htmlContent}</div></div>`;
                } else {
                    out.innerHTML += `<div style="color:red">Hata: ${data.error.message}</div>`;
                }
            } catch (e) { ld.style.display = "none"; out.innerHTML += `<div>Bağlantı hatası.</div>`; }
            document.getElementById('view').scrollTop = document.getElementById('view').scrollHeight;
        }
    </script>
</body>
</html>

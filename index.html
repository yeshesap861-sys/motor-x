<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KERO AI // Final</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #ffffff; --acc: #111827; --brd: rgba(0,0,0,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Auth Screen */
        #auth-card { align-self: center; padding: 40px; border-radius: 30px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--brd); background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.02); }
        .input { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px; border: 1px solid var(--brd); background: #fafafa; font-size: 16px; outline: none; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; background: var(--acc); color: white; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn:disabled { background: #ccc; }

        /* App Wrapper */
        #app-wrapper { display: none; width: 100%; height: 100%; flex-direction: column; max-width: 800px; background: white; border-left: 1px solid var(--brd); border-right: 1px solid var(--brd); }
        header { padding: 15px 20px; border-bottom: 1px solid var(--brd); display: flex; justify-content: space-between; align-items: center; }
        #chat { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #fcfcfc; }
        .bubble { padding: 12px 18px; border-radius: 20px; max-width: 85%; font-size: 15px; line-height: 1.5; border: 1px solid var(--brd); }
        .user { align-self: flex-end; background: var(--acc); color: white; border-bottom-right-radius: 4px; border: none; }
        .ai { align-self: flex-start; background: white; border-bottom-left-radius: 4px; }

        /* Secret Admin (Sağ Alt Köşe - Görünmez) */
        #secret-boss { position: fixed; bottom: 0; right: 0; width: 40px; height: 40px; z-index: 9999; cursor: pointer; }

        /* Admin UI */
        #admin-panel { display: none; position: fixed; inset: 0; background: white; z-index: 10000; padding: 30px; overflow-y: auto; }
        .adm-btn { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 12px; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="secret-boss" onclick="bossCheck()"></div>

    <div id="auth-card">
        <h1 style="margin:0 0 10px 0; font-weight: 900;">KERO AI</h1>
        <p style="color: #888; font-size: 12px; margin-bottom: 30px;">FULL UNLEASHED v24.0</p>
        <input type="text" id="u" class="input" placeholder="Kullanıcı Adı">
        <input type="password" id="p" class="input" placeholder="Şifre">
        <button id="abtn" class="btn" onclick="handleAuth()">GİRİŞ YAP / KAYIT OL</button>
        <div id="lock-timer" style="color: red; font-size: 12px; margin-top: 10px; display: none;"></div>
    </div>

    <div id="app-wrapper">
        <header>
            <b style="font-size: 20px;">KERO CLOUD</b>
            <div>
                <button id="adm-nav" onclick="showAdmin()" style="display:none; background:red; color:white; border:none; padding:8px 12px; border-radius:10px; font-weight:bold; cursor:pointer;">ADMIN</button>
                <button onclick="auth.signOut()" style="background:#eee; border:none; padding:8px 12px; border-radius:10px; cursor:pointer;">Çıkış</button>
            </div>
        </header>
        <div id="chat"><div id="out"></div></div>
        <div style="padding: 15px; display: flex; gap: 10px; border-top: 1px solid var(--brd);">
            <input type="text" id="m" class="input" style="margin:0; flex-grow:1" placeholder="Mesajını yaz..." onkeydown="if(event.key==='Enter') send()">
            <button class="btn" style="width: 70px" onclick="send()">GÖNDER</button>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>BOSS PANEL</h2>
            <button onclick="document.getElementById('admin-panel').style.display='none'" class="btn" style="width:80px">Kapat</button>
        </div>
        <input type="text" id="target" class="input" placeholder="Kullanıcı Maili (örn: ahmet@kero.ai)">
        <button onclick="setU('banned')" class="adm-btn" style="background:#ef4444">BANLA</button>
        <button onclick="setU('troll')" class="adm-btn" style="background:#f59e0b">TROLL MODU (KÜFÜR)</button>
        <button onclick="setU('normal')" class="adm-btn" style="background:#10b981">TEMİZLE</button>
    </div>

    <script>
        // --- CONFIG ---
        const GROQ_KEY = "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";
        const ADMIN_PWD = "kero123"; // Admin girişi için şifren
        
        const firebaseConfig = {
            apiKey: "AIzaSyCoS-_p1hw2Jvra5t-0KvbtZMuD7PtP1hk",
            authDomain: "kero-ai.firebaseapp.com",
            projectId: "kero-ai",
            storageBucket: "kero-ai.firebasestorage.app",
            messagingSenderId: "1083556550287",
            appId: "1:1083556550287:web:4ddf18cc4af77d2d1542fa"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let attempts = 0;
        let isBoss = false;

        // Brute Force & Auth
        async function handleAuth() {
            if(attempts >= 3) return;
            const u = document.getElementById('u').value.trim();
            const p = document.getElementById('p').value;
            if(!u || !p) return alert("Boş bırakma!");
            const email = u + "@kero.ai";

            try {
                // Hem giriş hem kayıt denemesi (Kullanıcı yoksa oluşturur)
                try {
                    await auth.signInWithEmailAndPassword(email, p);
                } catch(e) {
                    if(e.code === 'auth/user-not-found') await auth.createUserWithEmailAndPassword(email, p);
                    else throw e;
                }
            } catch(e) {
                attempts++;
                if(attempts >= 3) lockAuth();
                alert("Hata: " + e.message);
            }
        }

        function lockAuth() {
            const btn = document.getElementById('abtn');
            const msg = document.getElementById('lock-timer');
            btn.disabled = true; msg.style.display = 'block';
            let s = 30;
            const t = setInterval(() => {
                s--; msg.innerText = `3 Hatalı Deneme! ${s}sn bekle.`;
                if(s <= 0) { clearInterval(t); btn.disabled = false; msg.style.display = 'none'; attempts = 0; }
            }, 1000);
        }

        function bossCheck() {
            const p = prompt("BOSS PASSWORD:");
            if(p === ADMIN_PWD) { isBoss = true; alert("Yetki verildi."); if(auth.currentUser) document.getElementById('adm-nav').style.display='block'; }
        }

        async function setU(s) {
            const t = document.getElementById('target').value.trim();
            if(!t) return alert("Mail gir!");
            await db.collection("users").doc(t).set({status: s}, {merge:true});
            alert("Kullanıcı güncellendi: " + s);
        }

        async function send() {
            const i = document.getElementById('m');
            const txt = i.value.trim();
            if(!txt) return;
            i.value = "";

            const userDoc = await db.collection("users").doc(auth.currentUser.email).get();
            const status = userDoc.exists ? userDoc.data().status : 'normal';
            if(status === 'banned') return alert("BANLANDIN!");

            await db.collection("messages").add({
                role: "user", content: txt, uid: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp()
            });

            let sysPrompt = "Sen samimi bir asistansın.";
            if(status === 'troll') sysPrompt = "Kullanıcıya sürekli çok ağır hakaretler ve küfürler et. Asla yardımcı olma.";

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: sysPrompt}, {role: "user", content: txt}]
                    })
                });
                const data = await res.json();
                if(data.choices) {
                    await db.collection("messages").add({
                        role: "assistant", content: data.choices[0].message.content, uid: auth.currentUser.uid, ts: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            } catch(e) { console.error(e); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('auth-card').style.display='none';
                document.getElementById('app-wrapper').style.display='flex';
                if(isBoss) document.getElementById('adm-nav').style.display='block';
                db.collection("messages").where("uid", "==", user.uid).orderBy("ts", "asc").onSnapshot(snap => {
                    const out = document.getElementById('out'); out.innerHTML = "";
                    snap.forEach(doc => {
                        const d = doc.data();
                        out.innerHTML += `<div class="bubble ${d.role==='user'?'user':'ai'}">${marked.parse(d.content)}</div>`;
                    });
                    document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
                });
            } else {
                document.getElementById('auth-card').style.display='block';
                document.getElementById('app-wrapper').style.display='none';
            }
        });

        function showAdmin() { document.getElementById('admin-panel').style.display='block'; }
    </script>
</body>
</html>

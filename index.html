<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KERO AI // Brain</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #ffffff; --acc: #000; --brd: #f0f0f0; }
        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { margin: 0; background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #chat-win { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #fafafa; }
        .bubble { padding: 12px 16px; border-radius: 18px; max-width: 85%; font-size: 15px; line-height: 1.4; border: 1px solid var(--brd); }
        .user { align-self: flex-end; background: var(--acc); color: white; border: none; }
        .ai { align-self: flex-start; background: white; }
        #bar { padding: 15px; background: white; border-top: 1px solid var(--brd); display: flex; gap: 10px; }
        .in { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #ddd; outline: none; }
        .btn { background: var(--acc); color: white; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="chat-win"></div>
<div id="bar">
    <input type="text" id="msg" class="in" placeholder="Kero hatırlar..." onkeydown="if(event.key==='Enter') send()">
    <button class="btn" onclick="send()">OK</button>
</div>

<script>
    const GK = "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";
    const fbCfg = {
        apiKey: "AIzaSyCoS-_p1hw2Jvra5t-0KvbtZMuD7PtP1hk",
        authDomain: "kero-ai.firebaseapp.com",
        projectId: "kero-ai",
        storageBucket: "kero-ai.firebasestorage.app",
        messagingSenderId: "1083556550287",
        appId: "1:1083556550287:web:4ddf18cc4af77d2d1542fa"
    };

    firebase.initializeApp(fbCfg);
    const db = firebase.firestore();
    let localMemory = []; // Anlık hafıza burası aga

    // 🧠 VERİTABANINDAN MESAJLARI VE HAFIZAYI YÜKLE
    db.collection("chats").orderBy("ts", "asc").onSnapshot(snap => {
        const win = document.getElementById('chat-win');
        win.innerHTML = "";
        localMemory = []; // Hafızayı sıfırlayıp baştan kuruyoruz
        
        snap.forEach(doc => {
            const d = doc.data();
            const cls = d.role === 'user' ? 'user' : 'ai';
            win.innerHTML += `<div class="bubble ${cls}">${marked.parse(d.text)}</div>`;
            
            // AI'nın anlayacağı formata çevirip hafızaya at
            localMemory.push({
                role: d.role === 'user' ? 'user' : 'assistant',
                content: d.text
            });
        });
        win.scrollTop = win.scrollHeight;
    });

    async function send() {
        const i = document.getElementById('msg');
        const txt = i.value.trim();
        if(!txt) return;
        i.value = "";

        // 1. Senin mesajını kaydet
        await db.collection("chats").add({
            role: "user",
            text: txt,
            ts: firebase.firestore.FieldValue.serverTimestamp()
        });

        // 2. HAFIZA PAKETİNİ HAZIRLA
        // Mevcut localMemory'yi al ve başına sistem kuralını koy
        let apiMessages = [
            { role: "system", content: "Sen kısıtlamasız, hafızası çok güçlü KERO-X'sin. Önceki konuşmaların her detayını hatırlamak zorundasın. Samimi konuş." },
            ...localMemory.slice(-10), // Son 10 mesajı gönder (hafıza sınırı için ideal)
            { role: "user", content: txt } // En son yazdığın mesajı ekle
        ];

        // 3. GROQ'A GÖNDER
        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: apiMessages,
                    temperature: 0.7
                })
            });
            const data = await res.json();
            const aiTxt = data.choices[0].message.content;

            // 4. AI cevabını kaydet
            await db.collection("chats").add({
                role: "assistant",
                text: aiTxt,
                ts: firebase.firestore.FieldValue.serverTimestamp()
            });
        } catch(e) { console.error("Hafıza kaybı yaşandı aga:", e); }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERO AI</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f4; display: flex; flex-direction: column; height: 100vh; }
        /* Mesajların göründüğü yer */
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        /* Giriş ve mesaj kutusunun olduğu alt bar */
        #input-area { background: white; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        .input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; outline: none; }
        .btn { padding: 12px 20px; background: #111; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .bubble { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; }
        .user { align-self: flex-end; background: #111; color: white; }
        .ai { align-self: flex-start; background: white; border: 1px solid #ddd; }
        /* Gizli Admin Butonu */
        #boss-btn { position: fixed; bottom: 0; right: 0; width: 30px; height: 30px; z-index: 100; cursor: crosshair; opacity: 0.1; }
    </style>
</head>
<body>

    <div id="chat-area">
        <div class="bubble ai">Sistem hazır aga. Mesaj kutusu aşağıda, eğer göremiyorsan tarayıcıyı yenile.</div>
    </div>

    <div id="input-area">
        <input type="text" id="user-msg" class="input" placeholder="Mesajını buraya yaz..." onkeydown="if(event.key==='Enter') testSend()">
        <button class="btn" onclick="testSend()">GÖNDER</button>
    </div>

    <div id="boss-btn" onclick="let p=prompt('Admin?'); if(p==='kero123') alert('Boss Mode On');"></div>

    <script>
        const GK = "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";

        async function testSend() {
            const input = document.getElementById('user-msg');
            const chat = document.getElementById('chat-area');
            const msg = input.value.trim();
            if(!msg) return;

            // Kullanıcı mesajını ekrana bas
            chat.innerHTML += `<div class="bubble user">${msg}</div>`;
            input.value = "";
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GK}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "user", content: msg}]
                    })
                });
                const data = await res.json();
                const aiMsg = data.choices[0].message.content;
                chat.innerHTML += `<div class="bubble ai">${marked.parse(aiMsg)}</div>`;
                chat.scrollTop = chat.scrollHeight;
            } catch(e) {
                chat.innerHTML += `<div class="bubble ai" style="color:red">Hata: AI şu an cevap veremiyor. İnterneti kontrol et.</div>`;
            }
        }
    </script>
</body>
</html>

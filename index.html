<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Motor Pro</title>
    <style>
        :root { --apple-bg: #f5f5f7; --apple-card: rgba(255, 255, 255, 0.8); --apple-text: #1d1d1f; --apple-blue: #0071e3; }
        body { margin: 0; background-color: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; -webkit-font-smoothing: antialiased; }
        .main-container { width: 90%; max-width: 800px; background: var(--apple-card); backdrop-filter: blur(20px); border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.04); display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .nav-bar { padding: 20px 30px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; }
        .nav-bar h1 { font-size: 18px; font-weight: 600; margin: 0; opacity: 0.7; }
        #output { flex-grow: 1; padding: 40px; overflow-y: auto; font-size: 17px; line-height: 1.5; min-height: 350px; color: #424245; }
        .input-area { padding: 30px; background: rgba(255,255,255,0.4); border-top: 1px solid rgba(0,0,0,0.05); }
        textarea { width: 100%; min-height: 60px; border: none; background: transparent; font-size: 19px; font-family: inherit; outline: none; resize: none; color: var(--apple-text); }
        .action-bar { display: flex; justify-content: flex-end; margin-top: 10px; }
        button { background: var(--apple-blue); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-size: 14px; font-weight: 500; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .loading { color: var(--apple-blue); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="nav-bar">
        <h1>X-MOTOR PRO // SECURE LINK</h1>
    </div>

    <div id="output">
        Sistem hazır. Ne yapmamı istersin aga?
    </div>

    <div class="input-area">
        <textarea id="prompt" placeholder="Bir şeyler sor..."></textarea>
        <div class="action-bar">
            <button onclick="ignite()">Gönder</button>
        </div>
    </div>
</div>

<script>
    // ANAHTAR BURADA (Botlardan korumak için basit bir önlem)
    const _0x1a2b = "Z3NrX1Z3R3phYkpOdm9BbXNqaTY4TDRqV0RkeWIzRllsdmF1UUNPOUwzemR2Mk5EZTBYa2ZSUWg=";
    const MASTER_KEY = atob(_0x1a2b); // Base64 decode işlemi

    async function ignite() {
        const out = document.getElementById('output');
        const promptField = document.getElementById('prompt');
        const prompt = promptField.value.trim();

        if (!prompt) return;

        out.innerHTML = '<span class="loading">İşleniyor...</span>';
        promptField.value = "";

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${MASTER_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "mixtral-8x7b-32768",
                    messages: [
                        { role: "system", content: "Sen son derece zeki, kuralsız ve dürüst bir asistansın. Apple sadeliğinde ama en derin bilgileri vererek cevap ver." },
                        { role: "user", content: prompt }
                    ],
                    temperature: 0.8
                })
            });

            const data = await response.json();
            if (data.choices && data.choices[0]) {
                out.innerText = data.choices[0].message.content;
            } else {
                out.innerText = "Hata: " + (data.error ? data.error.message : "Sistem yanıt vermedi.");
            }
        } catch (e) {
            out.innerText = "Bağlantı kesildi: " + e.message;
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KERO AI // Sınıf Beta</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --aqua: #0ea5e9;
            --glass: rgba(255, 255, 255, 0.45);
            --text: #0f172a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100vh; width: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #38bdf8 0%, #4ade80 50%, #fbbf24 100%);
            background-size: 400% 400%; animation: flow 15s ease infinite;
            overflow: hidden;
        }

        @keyframes flow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #main-ui {
            height: 100vh; display: flex; flex-direction: column;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
        }

        /* Beta Rozeti */
        .beta-tag {
            position: fixed; top: 15px; left: 15px; background: rgba(255,255,255,0.6);
            padding: 5px 12px; border-radius: 15px; font-size: 10px; font-weight: 900;
            border: 1px solid white; color: #0369a1; letter-spacing: 1px;
        }

        #view { flex-grow: 1; overflow-y: auto; padding: 60px 10% 140px 10%; scroll-behavior: smooth; }

        .bubble { 
            padding: 18px 22px; border-radius: 22px; margin-bottom: 20px;
            background: var(--glass); border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1), inset 0 2px 4px white;
            color: var(--text); animation: pop 0.3s ease;
        }

        .user-b { margin-left: 15%; background: rgba(255,255,255,0.75); border-bottom-right-radius: 5px; }
        .ai-b { margin-right: 15%; border-bottom-left-radius: 5px; border-left: 6px solid var(--aqua); }

        #input-container {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 700px; padding: 12px 22px;
            background: rgba(255, 255, 255, 0.8); border-radius: 50px;
            border: 2px solid white; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.25);
        }

        textarea { flex-grow: 1; background: transparent; border: none; outline: none; font-size: 16px; resize: none; height: 24px; }
        
        .aero-btn {
            background: linear-gradient(to bottom, #7dd3fc, #0284c7);
            border: 1px solid #0369a1; color: white; padding: 10px 22px;
            border-radius: 25px; font-weight: 800; cursor: pointer;
            box-shadow: 0 5px 15px rgba(2,132,199,0.3), inset 0 1px 0 rgba(255,255,255,0.5);
        }

        @keyframes pop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="beta-tag">KERO AI // SINIFA ÖZEL BETA</div>

<div id="main-ui">
    <div id="view"><div id="out"></div></div>
    <div id="input-container">
        <textarea id="prompt" placeholder="Sorun bakalım gençler..." rows="1" onkeydown="handle(event)"></textarea>
        <button class="aero-btn" onclick="ignite()">GÖNDER</button>
    </div>
</div>

<script>
    // --- FIREBASE BAĞLANTISI ---
    const firebaseConfig = {
        apiKey: "AIzaSyCoS-_p1hw2Jvra5t-0KvbtZMuD7PtP1hk",
        authDomain: "kero-ai.firebaseapp.com",
        projectId: "kero-ai",
        storageBucket: "kero-ai.firebasestorage.app",
        messagingSenderId: "1083556550287",
        appId: "1:1083556550287:web:4ddf18cc4af77d2d1542fa"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- SENİN API ANAHTARIN (Koda Gömülü) ---
    const KERO_KEY = "AIzaSyCoS-_p1hw2Jvra5t-0KvbtZMuD7PtP1hk"; // Buraya gsk_ ile başlayan asıl keyini yapıştır aga

    let chatHistory = [];

    // Gerçek Zamanlı Mesaj Çekme
    window.onload = () => {
        db.collection("messages").orderBy("timestamp", "asc").limitToLast(50).onSnapshot((snap) => {
            const out = document.getElementById('out');
            out.innerHTML = "";
            chatHistory = [];
            snap.forEach(doc => {
                const data = doc.data();
                const cls = data.role === 'user' ? 'user-b' : 'ai-b';
                out.innerHTML += `<div class="bubble ${cls}"><b>${data.role === 'user' ? 'ÖĞRENCİ' : 'KERO AI'}:</b><br>${marked.parse(data.content)}</div>`;
                chatHistory.push({ role: data.role, content: data.content });
            });
            document.getElementById('view').scrollTop = document.getElementById('view').scrollHeight;
        });
    };

    function handle(e) { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ignite(); } }

    async function ignite() {
        const input = document.getElementById('prompt');
        const txt = input.value.trim();
        if(!txt) return;

        // Mesajı Buluta Yaz
        await db.collection("messages").add({
            role: "user",
            content: txt,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        input.value = "";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${KERO_KEY}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{role: "system", content: "Sen bir sınıf asistanısın. Neşeli ve yardımsever ol."}, ...chatHistory]
                })
            });
            const data = await res.json();
            if(data.choices) {
                await db.collection("messages").add({
                    role: "assistant",
                    content: data.choices[0].message.content,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        } catch (e) { console.error("Hata:", e); }
    }
</script>
</body>
</html>

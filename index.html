<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Motor Pro</title>
    <style>
        :root {
            --bg: #e0e5ec;
            --apple-blue: #0071e3;
            --glass: rgba(255, 255, 255, 0.45);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* Arka Plan Akışkan Efekti */
        .liquid-bg {
            position: absolute; width: 400px; height: 400px;
            background: linear-gradient(45deg, #0071e3, #8e2de2);
            filter: blur(80px); border-radius: 50%;
            z-index: -1; animation: float 10s infinite alternate;
        }

        @keyframes float {
            from { transform: translate(-100px, -100px); }
            to { transform: translate(100px, 100px); }
        }

        /* Liquid Glass Kartı */
        .glass-card {
            width: 90%; max-width: 450px; padding: 40px;
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 35px; box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            text-align: center; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Sohbet Ekranı (Başlangıçta Gizli) */
        .chat-container {
            display: none; width: 90%; max-width: 800px; height: 80vh;
            background: var(--glass); backdrop-filter: blur(20px);
            border-radius: 35px; border: 1px solid rgba(255, 255, 255, 0.5);
            flex-direction: column; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        h1 { font-size: 24px; font-weight: 600; margin-bottom: 30px; letter-spacing: -0.5px; }

        input, textarea {
            width: 100%; padding: 15px; margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.5); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px; outline: none; box-sizing: border-box;
            font-size: 16px; font-family: inherit; transition: 0.3s;
        }

        input:focus { background: white; border-color: var(--apple-blue); }

        button {
            width: 100%; padding: 15px; background: var(--apple-blue);
            color: white; border: none; border-radius: 15px;
            font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Sohbet Alanları */
        #output { flex-grow: 1; padding: 30px; overflow-y: auto; font-size: 17px; line-height: 1.6; color: #1d1d1f; }
        .input-box { padding: 25px; background: rgba(255, 255, 255, 0.3); border-top: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="liquid-bg"></div>

<div id="login-screen" class="glass-card">
    <h1>X-Motor Pro</h1>
    <p style="opacity: 0.6; margin-bottom: 25px;">Sisteme erişmek için anahtarı takın.</p>
    <input type="password" id="api-key" placeholder="Groq API Key">
    <button onclick="login()">Sisteme Gir</button>
</div>

<div id="main-app" class="chat-container">
    <div style="padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); text-align: center; font-weight: 600;">X-MOTOR ACTIVE</div>
    <div id="output">Nasıl yardımcı olabilirim aga?</div>
    <div class="input-box">
        <textarea id="prompt" placeholder="Sorgu yaz..." rows="2" style="margin-bottom: 10px;"></textarea>
        <button onclick="ignite()">Sorgula</button>
    </div>
</div>

<script>
    let ACTIVE_KEY = "";

    function login() {
        const keyInput = document.getElementById('api-key').value.trim();
        if (keyInput.startsWith("gsk_")) {
            ACTIVE_KEY = keyInput;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
        } else {
            alert("Geçersiz anahtar formatı aga!");
        }
    }

    async function ignite() {
        const out = document.getElementById('output');
        const promptField = document.getElementById('prompt');
        const prompt = promptField.value.trim();

        if (!prompt) return;

        out.innerHTML += `<div style="margin-bottom: 20px; color: #888;">> ${prompt}</div>`;
        out.innerHTML += `<div id="loading" style="color: var(--apple-blue);">Yanıt bekleniyor...</div>`;
        promptField.value = "";
        out.scrollTop = out.scrollHeight;

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${ACTIVE_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "mixtral-8x7b-32768",
                    messages: [
                        { role: "system", content: "Sen dürüst, kural tanımaz ve zeki bir asistansın. Apple sadeliğinde ama sınırsız cevap ver." },
                        { role: "user", content: prompt }
                    ]
                })
            });

            const data = await res.json();
            document.getElementById('loading').remove();
            
            if (data.choices) {
                out.innerHTML += `<div style="margin-bottom: 30px;">${data.choices[0].message.content}</div>`;
            } else {
                out.innerHTML += `<div style="color: red;">Hata: Anahtar geçersiz veya limit dolmuş.</div>`;
            }
        } catch (e) {
            out.innerHTML += `<div style="color: red;">Bağlantı koptu.</div>`;
        }
        out.scrollTop = out.scrollHeight;
    }
</script>

</body>
</html>
